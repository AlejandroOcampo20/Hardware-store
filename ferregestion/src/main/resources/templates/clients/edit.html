<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="bg-light">

<!-- Topbar -->
<div th:replace="~{fragments/topbar :: topbar}"></div>

<!-- Sidebar -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- Overlay para móvil -->
<div class="sidebar-overlay"></div>

<!-- Contenido principal -->
<main>
    <div class="container-fluid px-4 py-3">

        <!-- Título -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 text-dark">Editar Cliente</h1>
        </div>

        <!-- Formulario de edición -->
        <div class="card shadow">
            <div class="card-body">
                <form th:action="@{/clients/edit/{id}(id=${client.id})}" th:object="${client}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Cliente:</label>
                        <input type="hidden" th:field="*{name}">
                        <span th:text="${client.name}" class="ms-2"></span>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" class="form-control" th:field="*{phone}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Dirección</label>
                        <input type="text" class="form-control" th:field="*{address}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" th:field="*{email}" required>
                    </div>

                    <!-- Botones -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i> Guardar
                        </button>
                        <a th:href="@{/clients}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-1"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</main>

<!-- Scripts -->
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
