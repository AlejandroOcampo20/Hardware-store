<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>

<body class="bg-light">

    <!-- Topbar -->
    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Overlay para móvil -->
    <div class="sidebar-overlay"></div>

    <!-- Contenido principal -->
    <main>
        <div class="container-fluid px-4 py-3">

            <!-- Título y botón -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 text-dark">Clientes Inactivos</h1>
                <a class="btn btn-secondary btn-sm d-flex align-items-center" th:href="@{/clients}">
                    <i class="bi bi-arrow-left me-1"></i> Volver
                </a>
            </div>

            <!-- Resumen de Clientes Inactivos -->
            <div class="row g-4 mb-4">
                <div class="col-xl-3 col-md-6">
                    <div class="card border-left-warning shadow h-100 py-2">
                        <div class="card-body">
                            <div class="row align-items-center">
                                <div class="col-8">
                                    <div class="text-muted small">Total Clientes Inactivos</div>
                                    <div class="h5 mb-0 fw-bold" th:text="${totalInactive}">0</div>
                                </div>
                                <div class="col-4 text-end">
                                    <i class="bi bi-person-x text-warning" style="font-size: 2rem;"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabla de Clientes Inactivos -->
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <i class="bi bi-person-x me-1"></i> Lista de Clientes Inactivos
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover" id="dataTable">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Teléfono</th>
                                    <th>Dirección</th>
                                    <th>Correo Electrónico</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="client : ${inactiveClients}">
                                    <td th:text="'#' + ${client.id}">#001</td>
                                    <td th:text="${client.name}">Nombre</td>
                                    <td th:text="${client.phone}">00000000</td>
                                    <td th:text="${client.address}">Dirección</td>
                                    <td th:text="${client.email}">correo@example.com</td>
                                    <td>
                                        <form method="post" th:action="@{/clients/activate/{id}(id=${client.id})}">
                                            <input type="hidden" th:name="${_csrf.parameterName}"
                                                th:value="${_csrf.token}" />
                                            <button type="submit" class="btn btn-success btn-sm">
                                                <i class="bi bi-check2-circle"></i> Activar
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
