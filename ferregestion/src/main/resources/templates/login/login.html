<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - FerreGestión</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <!-- Header -->
        <div class="card-header bg-orange text-dark text-center py-4">
            <i class="bi bi-tools fs-3 me-3 text-white mb-1 d-inline-block bg-primary rounded-circle"></i>
            <h2 class="fw-bold mb-1">FerreGestión</h2>
            <p class="mb-0 small" style="opacity: 0.9;">Sistema de Gestión Integral</p>
        </div>

        <!-- Body -->
        <div class="card-body p-4">
            <!-- Mensajes de alerta -->
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong>Error:</strong> <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>
            <div th:if="${logoutMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <strong>¡Listo!</strong> <span th:text="${logoutMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>

            <!-- Formulario de login -->
            <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
                <div class="mb-3">
                    <label for="username" class="form-label fw-medium">Correo electrónico</label>
                    <input type="email"
                           class="form-control"
                           id="username"
                           name="username"
                           placeholder="tu@correo.com"
                           required>
                    <div class="invalid-feedback">
                        Por favor ingresa un correo válido.
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-medium">Contraseña</label>
                    <input type="password"
                           class="form-control"
                           id="password"
                           name="password"
                           placeholder="••••••••"
                           required>
                    <div class="invalid-feedback">
                        Por favor ingresa tu contraseña.
                    </div>
                </div>

                <!-- Botón de acceso -->
                <button type="submit" class="btn btn-orange w-100 py-2 fw-semibold">
                    Iniciar Sesión
                </button>
            </form>
        </div>

        <!-- Footer opcional -->
        <div class="text-center py-3 text-muted small" style="background-color: #f8f9fa; border-top: 1px solid #eee;">
            ¿Olvidaste tu contraseña? <a href="#" class="text-decoration-none" style="color: var(--primary-orange);">Recupérala aquí</a>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle (para los alert y funcionalidades) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Validación personalizada -->
<script th:src="@{/js/login-validation.js}"></script>
</body>
</html>
