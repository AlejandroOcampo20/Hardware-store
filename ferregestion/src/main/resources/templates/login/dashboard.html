<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="bg-light">

<!-- Topbar -->
<div th:replace="~{fragments/topbar :: topbar}"></div>

<!-- Sidebar -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- Overlay para móvil -->
<div class="sidebar-overlay"></div>

<!-- Contenido principal -->
<main>
    <div class="container-fluid px-4 py-3">

        <!-- Título y botón -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 text-dark">Dashboard</h1>
            <a href="/sales/create" class="btn btn-orange btn-sm">
                <i class="bi bi-cart-plus-fill me-1"></i> Nueva Venta
            </a>
        </div>

        <!-- Tarjetas resumen -->
        <div class="row g-4 mb-4">
            <div class="col-xl-3 col-md-6">
                <div class="card border-left-primary shadow h-100 py-2">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-8">
                                <div class="text-muted small">Productos</div>
                                <div class="h5 mb-0 fw-bold" th:text="${totalProducts}">0</div>
                            </div>
                            <div class="col-4 text-end">
                                <i class="bi bi-box-seam text-secondary" style="font-size: 2rem;"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6">
                <div class="card border-left-success shadow h-100 py-2">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-8">
                                <div class="text-muted small">Empleados</div>
                                <div class="h5 mb-0 fw-bold" th:text="${totalEmployees}">0</div>
                            </div>
                            <div class="col-4 text-end">
                                <i class="bi bi-people text-secondary" style="font-size: 2rem;"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6">
                <div class="card border-left-info shadow h-100 py-2">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-8">
                                <div class="text-muted small">Clientes</div>
                                <div class="h5 mb-0 fw-bold" th:text="${totalClients}">0</div>
                            </div>
                            <div class="col-4 text-end">
                                <i class="bi bi-person-badge text-secondary" style="font-size: 2rem;"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6">
                <div class="card border-left-warning shadow h-100 py-2">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-8">
                                <div class="text-muted small">Proveedores</div>
                                <div class="h5 mb-0 fw-bold" th:text="${totalSuppliers}">0</div>
                            </div>
                            <div class="col-4 text-end">
                                <i class="bi bi-truck text-secondary" style="font-size: 2rem;"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Gráficas -->
        <div class="row mb-4">
            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <i class="bi bi-graph-up me-1"></i> Ventas de la Semana
                    </div>
                    <div class="card-body">
                        <canvas id="salesChart" height="120"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <i class="bi bi-boxes me-1"></i> Categorías
                    </div>
                    <div class="card-body">
                        <canvas id="productsChart" height="120"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tablas -->
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow">
                    <div class="card-header bg-danger text-white">
                        <i class="bi bi-exclamation-triangle me-1"></i> Stock Bajo
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-sm table-hover">
                                <thead>
                                <tr>
                                    <th>Producto</th>
                                    <th>Stock</th>
                                    <th>Mínimo</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="p : ${lowStockProducts}">
                                    <td th:text="${p.name}">Producto</td>
                                    <td class="text-danger fw-bold" th:text="${p.stock}">0</td>
                                    <td th:text="${p.minStock}">5</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <i class="bi bi-clock-history me-1"></i> Últimas Ventas
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-sm table-hover">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Cliente</th>
                                    <th>Total</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="s : ${recentSales}">
                                    <td th:text="${s.id}">#001</td>
                                    <td th:text="${s.client?.name ?: 'Sin cliente'}">Cliente</td>
                                    <td th:text="${#numbers.formatCurrency(s.total)}">$1.200.000</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<!-- Scripts -->
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
