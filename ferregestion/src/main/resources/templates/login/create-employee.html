<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Empleado - FerreGestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-orange">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Admin - FerreGestión</a>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-light btn-sm">Cerrar Sesión</button>
        </form>
    </div>
</nav>

<div class="container mt-4">
    <h2>Crear Nuevo Empleado</h2>

    <form th:action="@{/admin/employees/create}" method="post" class="needs-validation" novalidate>
        <div class="mb-3">
            <label class="form-label">Nombre completo</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Documento</label>
            <input type="text" name="document" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" name="phone" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Posición</label>
            <input type="text" name="position" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Rol en sistema</label>
            <select name="role" class="form-select" required>
                <option value="EMPLEADO">EMPLEADO</option>
                <option value="ADMINISTRADOR">ADMINISTRADOR</option>
            </select>
        </div>

        <button type="submit" class="btn btn-orange">Crear Empleado</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
