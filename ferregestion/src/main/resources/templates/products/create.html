<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>

<body class="bg-light">

    <!-- Topbar -->
    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Overlay para móvil -->
    <div class="sidebar-overlay"></div>

    <!-- Contenido principal -->
    <main>
        <div class="container-fluid px-4 py-3">

            <!-- Encabezado -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 text-dark">Registrar Producto</h1>
            </div>

            <!-- Formulario -->
            <div class="card shadow">
                <div class="card-body">
                    <form th:action="@{/products/save}" th:object="${product}" method="post">

                        <!-- Nombre -->
                        <div class="mb-3">
                            <label for="name" class="form-label">Nombre</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control"
                                placeholder="Ingrese el nombre del producto" required maxlength="100">
                        </div>

                        <!-- Categoría -->
                        <div class="mb-3">
                            <label for="category" class="form-label">Categoría</label>
                            <input type="text" id="category" th:field="*{category}" class="form-control"
                                placeholder="Ingrese la categoría" maxlength="50">
                        </div>

                        <!-- Código -->
                        <div class="mb-3">
                            <label for="code" class="form-label">Código</label>
                            <input type="text" id="code" th:field="*{code}" class="form-control"
                                placeholder="Ingrese el código del producto" maxlength="50">
                        </div>

                        <!-- Descripción -->
                        <div class="mb-3">
                            <label for="description" class="form-label">Descripción</label>
                            <textarea id="description" th:field="*{description}" class="form-control"
                                placeholder="Ingrese una descripción del producto" rows="3" maxlength="200"></textarea>
                        </div>

                        <!-- Precio -->
                        <div class="mb-3">
                            <label for="price" class="form-label">Precio</label>
                            <input type="number" id="price" th:field="*{price}" class="form-control"
                                placeholder="Ingrese el precio" min="0">
                        </div>

                        <!-- Stock -->
                        <div class="mb-3">
                            <label for="stock" class="form-label">Stock</label>
                            <input type="number" id="stock" th:field="*{stock}" class="form-control"
                                placeholder="Ingrese la cantidad en stock" min="0">
                        </div>

                        <!-- Stock mínimo -->
                        <div class="mb-3">
                            <label for="min_stock" class="form-label">Stock Mínimo</label>
                            <input type="number" id="min_stock" th:field="*{min_stock}" class="form-control"
                                placeholder="Ingrese el stock mínimo requerido" min="0">
                        </div>

                        <!-- Proveedor -->
                        <div class="mb-3">
                            <label for="supplier_id" class="form-label">Proveedor</label>
                            <select id="supplier_id" th:field="*{supplier_id}" class="form-select">
                                <option value="">Seleccione un proveedor</option>
                                <option th:each="supplier : ${suppliers}" 
                                        th:value="${supplier.id}" 
                                        th:text="${supplier.name}"></option>
                            </select>
                        </div>

                        <!-- Activo -->
                        <div class="mb-3 form-check">
                            <input type="checkbox" id="is_active" th:field="*{is_active}" class="form-check-input">
                            <label for="is_active" class="form-check-label">Producto activo</label>
                        </div>

                        <!-- Botones -->
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i> Guardar
                            </button>
                            <a th:href="@{/products}" class="btn btn-secondary ms-2">
                                <i class="bi bi-x-circle me-1"></i> Cancelar
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
