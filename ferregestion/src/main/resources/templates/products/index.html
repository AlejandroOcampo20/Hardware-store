<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>

<body class="bg-light">

    <!-- Topbar -->
    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Overlay para móvil -->
    <div class="sidebar-overlay"></div>

    <!-- Contenido principal -->
    <main>
        <div class="container-fluid px-4 py-3">

            <!-- Encabezado -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 text-dark">Productos</h1>
                <div class="d-flex gap-2">
                    <a class="btn btn-warning btn-sm d-flex align-items-center" th:href="@{/products/inactive}">
                        <i class="bi bi-box-seam-fill me-1"></i> Ver Inactivos
                    </a>
                    <a th:href="@{/products/create}" class="btn btn-primary d-flex align-items-center">
                        <i class="bi bi-plus-circle me-1"></i> Nuevo Producto
                    </a>
                </div>
            </div>

            <!-- ALERTAS -->
            <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${error}">
                <i class="bi bi-exclamation-triangle-fill me-1"></i>
                <span th:text="${error}"></span>
                <button class="btn-close" data-bs-dismiss="alert" type="button"></button>
            </div>
            <div class="alert alert-success alert-dismissible fade show" role="alert" th:if="${success}">
                <i class="bi bi-check-circle-fill me-1"></i>
                <span th:text="${success}"></span>
                <button class="btn-close" data-bs-dismiss="alert" type="button"></button>
            </div>

            <!-- Contador de productos -->
            <div class="row g-4 mb-4">
                <div class="col-xl-3 col-md-6">
                    <div class="card border-left-info shadow h-100 py-2">
                        <div class="card-body">
                            <div class="row align-items-center">
                                <div class="col-8">
                                    <div class="text-muted small">Total Productos</div>
                                    <div class="h5 mb-0 fw-bold" th:text="${#lists.size(products)}">0</div>
                                </div>
                                <div class="col-4 text-end">
                                    <i class="bi bi-box-seam text-secondary" style="font-size: 2rem;"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabla de productos -->
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <i class="bi bi-box-seam-fill me-1"></i> Lista de Productos
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Categoría</th>
                                    <th>Código</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Stock Mínimo</th>
                                    <th>Proveedor</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="product : ${products}">
                                    <td th:text="'#' + ${product.id}"></td>
                                    <td th:text="${product.name}"></td>
                                    <td th:text="${product.category ?: 'Sin categoría'}"></td>
                                    <td th:text="${product.code ?: 'N/A'}"></td>
                                    <td th:text="'$' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 2, 'POINT')}"></td>
                                    <td>
                                        <span th:text="${product.stock}"
                                              th:class="${product.stock <= product.minStock} ? 'badge bg-danger' : 'badge bg-success'">
                                        </span>
                                    </td>
                                    <td th:text="${product.minStock}"></td>
                                    <td th:text="${product.supplier != null ? product.supplier.name : 'Sin proveedor'}"></td>
                                    <td>
                                        <span th:if="${product.isActive}" class="badge bg-success">Activo</span>
                                        <span th:unless="${product.isActive}" class="badge bg-danger">Inactivo</span>
                                    </td>
                                    <td>
                                        <a class="btn btn-sm btn-info me-1"
                                            th:href="@{/products/edit/{id}(id=${product.id})}" title="Editar">
                                            <i class="bi bi-pencil"></i>
                                        </a>

                                        <!-- Botón que abre el modal -->
                                        <button type="button" class="btn btn-sm btn-danger" data-bs-toggle="modal"
                                            th:data-bs-target="'#deleteModal-' + ${product.id}">
                                            <i class="bi bi-trash"></i>
                                        </button>

                                        <!-- Modal de confirmación -->
                                        <div class="modal fade" th:id="'deleteModal-' + ${product.id}" tabindex="-1"
                                            aria-labelledby="deleteModalLabel" aria-hidden="true">
                                            <div class="modal-dialog modal-dialog-centered">
                                                <div class="modal-content">
                                                    <div class="modal-header">
                                                        <h5 class="modal-title">Confirmar eliminación</h5>
                                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                                            aria-label="Close"></button>
                                                    </div>
                                                    <div class="modal-body">
                                                        ¿Seguro que deseas inactivar el producto
                                                        <strong th:text="${product.name}">Nombre</strong>?
                                                    </div>
                                                    <div class="modal-footer">
                                                        <form method="post"
                                                            th:action="@{/products/delete/{id}(id=${product.id})}">
                                                            <!-- ✅ Protección condicional contra falta de CSRF -->
                                                            <div th:if="${_csrf != null}">
                                                                <input type="hidden" th:name="${_csrf.parameterName}"
                                                                    th:value="${_csrf.token}" />
                                                            </div>
                                                            <button type="submit" class="btn btn-danger">Aceptar</button>
                                                        </form>
                                                        <button type="button" class="btn btn-secondary"
                                                            data-bs-dismiss="modal">Cancelar</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(products)}">
                                    <td colspan="10" class="text-center">No hay productos registrados</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
