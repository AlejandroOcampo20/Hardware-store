<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="bg-light">

<!-- Topbar -->
<div th:replace="~{fragments/topbar :: topbar}"></div>

<!-- Sidebar -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- Overlay para móvil -->
<div class="sidebar-overlay"></div>

<!-- Contenido principal -->
<main>
    <div class="container-fluid px-4 py-3">

        <!-- Título -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 text-dark">Editar Producto</h1>
        </div>

        <!-- Formulario de edición -->
        <div class="card shadow">
            <div class="card-body">
                <form th:action="@{/products/edit/{id}(id=${product.id})}" th:object="${product}" method="post">
                    
                    <!-- ID (oculto) -->
                    <input type="hidden" th:field="*{id}">
                    
                    <!-- Nombre -->
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" th:field="*{name}" 
                               placeholder="Nombre del producto" required maxlength="100">
                    </div>

                    <!-- Categoría -->
                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <input type="text" class="form-control" th:field="*{category}" 
                               placeholder="Categoría del producto" maxlength="50">
                    </div>

                    <!-- Código -->
                    <div class="mb-3">
                        <label class="form-label">Código</label>
                        <input type="text" class="form-control" th:field="*{code}" 
                               placeholder="Código del producto" maxlength="50">
                    </div>

                    <!-- Descripción -->
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" th:field="*{description}" 
                                  placeholder="Descripción del producto" rows="3" maxlength="200"></textarea>
                    </div>

                    <!-- Precio -->
                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number" class="form-control" th:field="*{price}" 
                               placeholder="Precio del producto" min="0">
                    </div>

                    <!-- Stock -->
                    <div class="mb-3">
                        <label class="form-label">Stock</label>
                        <input type="number" class="form-control" th:field="*{stock}" 
                               placeholder="Cantidad en stock" min="0">
                    </div>

                    <!-- Stock Mínimo -->
                    <div class="mb-3">
                        <label class="form-label">Stock Mínimo</label>
                        <input type="number" class="form-control" th:field="*{min_stock}" 
                               placeholder="Stock mínimo requerido" min="0">
                    </div>

                    <!-- Proveedor -->
                    <div class="mb-3">
                        <label class="form-label">Proveedor</label>
                        <select class="form-select" th:field="*{supplier_id}">
                            <option value="">Seleccione un proveedor</option>
                            <option th:each="supplier : ${suppliers}" 
                                    th:value="${supplier.id}" 
                                    th:text="${supplier.name}"
                                    th:selected="${supplier.id == product.supplier_id}"></option>
                        </select>
                    </div>

                    <!-- Activo -->
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" th:field="*{is_active}">
                        <label class="form-check-label">Producto activo</label>
                    </div>

                    <!-- Fecha de creación (solo lectura) -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Fecha de creación:</label>
                        <span th:text="${#temporals.format(product.created_at, 'dd/MM/yyyy HH:mm')}" 
                              class="ms-2"></span>
                    </div>

                    <!-- Botones -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i> Guardar cambios
                        </button>
                        <a th:href="@{/products}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-1"></i> Cancelar
                        </a>
                    </div>

                </form>
            </div>
        </div>

    </div>
</main>

<!-- Scripts -->
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
