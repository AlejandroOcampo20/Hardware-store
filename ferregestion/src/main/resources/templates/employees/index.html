<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>

<body class="bg-light">

    <!-- Topbar -->
    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Overlay para móvil -->
    <div class="sidebar-overlay"></div>

    <!-- Contenido principal -->
    <main>
        <div class="container-fluid px-4 py-3">

            <!-- Título y botón -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 text-dark">Gestión de Empleados</h1>
                <a class="btn btn-warning btn-sm d-flex align-items-center" th:href="@{/employees/inactive}">
                    <i class="bi bi-person-x me-1"></i> Ver Inactivos
                </a>
                <a class="btn btn-primary btn-sm d-flex align-items-center" th:href="@{/employees/create}">
                    <i class="bi bi-plus-circle me-1"></i> Nuevo Empleado
                </a>
            </div>

            <!-- Alertas -->
            <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${error}">
                <i class="bi bi-exclamation-triangle-fill me-1"></i>
                <span th:text="${error}"></span>
                <button class="btn-close" data-bs-dismiss="alert" type="button"></button>
            </div>
            <div class="alert alert-success alert-dismissible fade show" role="alert" th:if="${success}">
                <i class="bi bi-check-circle-fill me-1"></i>
                <span th:text="${success}"></span>
                <button class="btn-close" data-bs-dismiss="alert" type="button"></button>
            </div>

            <!-- Resumen de Empleados -->
            <div class="row g-4 mb-4">
                <div class="col-xl-3 col-md-6">
                    <div class="card border-left-info shadow h-100 py-2">
                        <div class="card-body">
                            <div class="row align-items-center">
                                <div class="col-8">
                                    <div class="text-muted small">Total Empleados</div>
                                    <div class="h5 mb-0 fw-bold" th:text="${#lists.size(employees)}">0</div>
                                </div>
                                <div class="col-4 text-end">
                                    <i class="bi bi-person-workspace text-secondary" style="font-size: 2rem;"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabla de Empleados -->
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <i class="bi bi-people-fill me-1"></i> Lista de Empleados
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover" id="dataTable">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Documento</th>
                                    <th>Teléfono</th>
                                    <th>Correo Electrónico</th>
                                    <th>Cargo</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="employee : ${employees}">
                                    <td th:text="'#' + ${employee.id}">#001</td>
                                    <td th:text="${employee.name}">Nombre</td>
                                    <td th:text="${employee.document}">00000000</td>
                                    <td th:text="${employee.phone}">00000000</td>
                                    <td th:text="${employee.email}">correo@example.com</td>
                                    <td th:text="${employee.position}">Cargo</td>
                                    <td>
                                        <a class="btn btn-sm btn-info me-1"
                                            th:href="@{/employees/edit/{id}(id=${employee.id})}" title="Editar">
                                            <i class="bi bi-pencil"></i>
                                        </a>

                                        <!-- Botón que abre el modal -->
                                        <button type="button" class="btn btn-sm btn-danger" data-bs-toggle="modal"
                                            th:data-bs-target="'#deleteModal-' + ${employee.id}">
                                            <i class="bi bi-trash"></i>
                                        </button>

                                        <!-- Modal de confirmación -->
                                        <div class="modal fade" th:id="'deleteModal-' + ${employee.id}" tabindex="-1"
                                            aria-labelledby="deleteModalLabel" aria-hidden="true">
                                            <div class="modal-dialog modal-dialog-centered">
                                                <div class="modal-content">
                                                    <div class="modal-header">
                                                        <h5 class="modal-title">Confirmar eliminación</h5>
                                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                                            aria-label="Close"></button>
                                                    </div>
                                                    <div class="modal-body">
                                                        ¿Seguro que deseas eliminar al empleado
                                                        <strong th:text="${employee.name}">Nombre</strong>?
                                                    </div>
                                                    <div class="modal-footer">
                                                        <form method="post"
                                                            th:action="@{/employees/delete/{id}(id=${employee.id})}">
                                                            <input type="hidden" th:name="${_csrf.parameterName}"
                                                                th:value="${_csrf.token}" />
                                                            <button type="submit"
                                                                class="btn btn-danger">Aceptar</button>
                                                        </form>

                                                        <button type="button" class="btn btn-secondary"
                                                            data-bs-dismiss="modal">Cancelar</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
