<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<nav class="navbar navbar-expand-lg navbar-dark bg-orange" th:fragment="topbar">
    <div class="container-fluid">

        <!-- Botón hamburguesa (controla sidebar) -->
        <button id="toggleSidebar" class="btn btn-outline-light me-2 bg-orange" aria-expanded="true" aria-controls="sidebarMenu">
            <i class="bi bi-list"></i>
        </button>

        <div class="ms-auto d-flex">
            <!-- Mostrar solo si NO está autenticado -->
            <a class="btn btn-outline-light me-2" th:href="@{/login}"
                th:if="${#authentication == null or #authentication.anonymous}">
                Iniciar sesión
            </a>

            <!-- Mostrar solo si está autenticado -->
            <div class="dropdown" th:if="${#authentication != null and !#authentication.anonymous}">
                <a class="btn btn-outline-light dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                    <span th:text="${#authentication.principal.username}">Usuario</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" th:href="@{/perfil}">Mi perfil</a></li>
                    <li><a class="dropdown-item" th:href="@{/logout}">Cerrar sesión</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>

</html>
