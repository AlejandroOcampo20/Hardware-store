<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>

<body class="bg-light">

    <!-- Topbar -->
    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Overlay para móvil -->
    <div class="sidebar-overlay"></div>

    <!-- Contenido principal -->
    <main>
        <div class="container-fluid px-4 py-3">

            <!-- Encabezado -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 text-dark">Registrar Proveedor</h1>
            </div>

            <!-- Formulario -->
            <div class="card shadow">
                <div class="card-body">
                    <form th:action="@{/suppliers/save}" th:object="${supplier}" method="post">

                        <!-- Nombre -->
                        <div class="mb-3">
                            <label for="name" class="form-label">Nombre del Proveedor</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control"
                                placeholder="Ingrese el nombre" required>
                        </div>

                        <!-- Dirección -->
                        <div class="mb-3">
                            <label for="address" class="form-label">Dirección</label>
                            <input type="text" id="address" th:field="*{address}" class="form-control"
                                placeholder="Ingrese la dirección" required>
                        </div>

                        <!-- Teléfono -->
                        <div class="mb-3">
                            <label for="phone" class="form-label">Teléfono</label>
                            <input type="text" id="phone" th:field="*{phone}" class="form-control"
                                placeholder="Ingrese el teléfono">
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control"
                                placeholder="ejemplo@correo.com">
                        </div>

                        <!-- Botones -->
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i> Guardar
                            </button>
                            <a th:href="@{/suppliers}" class="btn btn-secondary">
                                <i class="bi bi-x-circle me-1"></i> Cancelar
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
